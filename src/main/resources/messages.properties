properties# ============================================================
# Validation messages  -  English (default)
# Key format: {AnnotationName}.{modelAttributeName}.{fieldName}
# For @Size: {1}=max, {2}=min  (Spring passes attributes alphabetically)
# ============================================================

# ------------------------------------------------------------
# MemberInsertDTO
# ------------------------------------------------------------
NotNull.memberInsertDTO.firstname                       = First name is required
Size.memberInsertDTO.firstname                          = First name must be at least {2} characters long
NotNull.memberInsertDTO.lastname                        = Last name is required
Size.memberInsertDTO.lastname                           = Last name must be at least {2} characters long
Pattern.memberInsertDTO.vat                             = VAT number must contain at least 9 digits
NotNull.memberInsertDTO.sportId                         = Sport is required
NotNull.memberInsertDTO.userInsertDTO                   = User account information is required
NotNull.memberInsertDTO.personalInfoInsertDTO           = Personal information is required

# ------------------------------------------------------------
# MemberUpdateDTO
# ------------------------------------------------------------
NotNull.memberUpdateDTO.uuid                            = Member identifier (UUID) is required
NotNull.memberUpdateDTO.firstname                       = First name is required
Size.memberUpdateDTO.firstname                          = First name must be at least {2} characters long
NotNull.memberUpdateDTO.lastname                        = Last name is required
Size.memberUpdateDTO.lastname                           = Last name must be at least {2} characters long
Pattern.memberUpdateDTO.vat                             = VAT number must contain at least 9 digits
NotNull.memberUpdateDTO.sportId                         = Sport is required
NotNull.memberUpdateDTO.userUpdateDTO                   = User account information is required
NotNull.memberUpdateDTO.personalInfoUpdateDTO           = Personal information is required

# ------------------------------------------------------------
# UserInsertDTO
# ------------------------------------------------------------
NotNull.userInsertDTO.username                          = Username is required
Size.userInsertDTO.username                             = Username must be between {2} and {1} characters
NotNull.userInsertDTO.password                          = Password is required
Pattern.userInsertDTO.password                          = Password must be at least 8 characters and include at least one digit, one lowercase letter, one uppercase letter, and one special character (!@#$%^&+=)
NotNull.userInsertDTO.roleId                            = User role is required

# ------------------------------------------------------------
# UserUpdateDTO
# ------------------------------------------------------------
NotNull.userUpdateDTO.username                          = Username is required
Size.userUpdateDTO.username                             = Username must be between {2} and {1} characters
NotNull.userUpdateDTO.password                          = Password is required
Pattern.userUpdateDTO.password                          = Password must be at least 8 characters and include at least one digit, one lowercase letter, one uppercase letter, and one special character (!@#$%^&+=)

# ------------------------------------------------------------
# PersonalInfoInsertDTO
# ------------------------------------------------------------
NotNull.personalInfoInsertDTO.membershipId              = Membership ID is required
Pattern.personalInfoInsertDTO.membershipId              = Membership ID must be exactly 11 digits
NotBlank.personalInfoInsertDTO.identityNumber           = Identity number is required
NotBlank.personalInfoInsertDTO.placeOfBirth             = Place of birth is required
NotBlank.personalInfoInsertDTO.branchOfRegistration     = Branch of registration is required

# ------------------------------------------------------------
# PersonalInfoUpdateDTO
# ------------------------------------------------------------
NotEmpty.personalInfoUpdateDTO.membershipId             = Membership ID is required
Pattern.personalInfoUpdateDTO.membershipId              = Membership ID must be exactly 11 digits
NotEmpty.personalInfoUpdateDTO.identityNumber           = Identity number is required
NotEmpty.personalInfoUpdateDTO.placeOfBirth             = Place of birth is required
NotEmpty.personalInfoUpdateDTO.branchOfRegistration     = Branch of registration is required

# ------------------------------------------------------------
# AuthenticationRequestDTO
# ------------------------------------------------------------
NotNull.authenticationRequestDTO.username               = Username is required
NotNull.authenticationRequestDTO.password               = Password is required

# ------------------------------------------------------------
# Exception Messages
# ------------------------------------------------------------
MEMBER_NOT_FOUND                                        = Member with uuid={0} not found