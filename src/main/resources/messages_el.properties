Πρώτα η ερώτηση για το TEACHER_NOT_FOUND:
Αυτό δεν χρησιμοποιείται από το @Valid — το διαβάζεις χειροκίνητα μέσω MessageSource στο service:
javamessageSource.getMessage("TEACHER_NOT_FOUND", new Object[]{uuid}, Locale.getDefault())
Αντί για hardcoded string στον constructor του exception.

Και το αρχείο αλλαγμένο για sports club:
